name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - id: version
        run: |
          npm version ${{ inputs.bump }} -m "chore: bump version to %s"
          echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - run: git push origin HEAD:main "${{ steps.version.outputs.tag }}"
      - run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  # Runs in the same workflow run as `release` (job dependency, not a new
  # triggered run) because a release created with GITHUB_TOKEN does not fire
  # a new `release: published` event.
  publish:
    needs: [release]
    if: ${{ !cancelled() && (github.event_name == 'release' || needs.release.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.release.outputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --provenance --access public
